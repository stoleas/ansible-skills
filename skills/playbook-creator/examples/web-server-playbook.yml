---
# Purpose: Configure Apache web servers for production environment
# Type: web_server
# Functions: base_linux, apache_install, apache_config, app_deploy, firewall_setup, monitoring_agent
# Author: Generated by ansible-skills
# Last Updated: 2026-04-25

- name: Configure web server type
  hosts: web_server
  become: true

  vars:
    deployment_environment: "{{ env | default('production') }}"

  pre_tasks:
    - name: Update APT cache on Debian systems
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"
      changed_when: false
      tags: ['always']

    - name: Update YUM cache on RedHat systems
      ansible.builtin.yum:
        update_cache: true
      when: ansible_os_family == "RedHat"
      changed_when: false
      tags: ['always']

  roles:
    # Base operating system configuration
    - role: company.infrastructure.base_linux
      tags: ['base_linux', 'base', 'os']

    # Install Apache web server
    - role: company.web.apache_install
      tags: ['apache_install', 'web', 'install']

    # Configure Apache with SSL and modules
    - role: company.web.apache_config
      tags: ['apache_config', 'web', 'config']

    # Deploy web application
    - role: company.apps.web_app_deploy
      tags: ['web_app_deploy', 'application', 'deploy']

    # Configure firewall rules
    - role: company.security.firewall_setup
      tags: ['firewall_setup', 'security']

    # Install monitoring agent
    - role: company.observability.monitoring_agent
      tags: ['monitoring_agent', 'monitoring']

  post_tasks:
    - name: Wait for Apache to be ready
      ansible.builtin.wait_for:
        port: 443
        delay: 2
        timeout: 60
      tags: ['verify']

    - name: Verify web service health endpoint
      ansible.builtin.uri:
        url: "https://{{ ansible_fqdn }}/health"
        status_code: 200
        validate_certs: true
        timeout: 10
      delegate_to: localhost
      register: health_check
      tags: ['verify']

    - name: Report deployment status
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} web server deployment completed successfully"
      when: health_check is succeeded
      tags: ['verify']
