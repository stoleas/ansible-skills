---
# Landscape Playbook: ecommerce_platform
# Purpose: Deploy complete e-commerce platform infrastructure
# Architecture: PostgreSQL database, Java application servers, Nginx web servers, HAProxy load balancer
# Author: Generated by ansible-skills
# Last Updated: 2026-04-25

# Tier 1: Database Layer
- name: Deploy PostgreSQL database servers
  import_playbook: types/postgresql_server.yml
  tags: ['postgresql', 'database', 'tier1', 'data']

# Tier 2: Application Layer
- name: Deploy Java application servers
  import_playbook: types/java_app_server.yml
  tags: ['java', 'application', 'tier2', 'app']

# Tier 3: Web Layer
- name: Deploy Nginx web servers
  import_playbook: types/nginx_server.yml
  tags: ['nginx', 'web', 'tier3', 'frontend']

# Infrastructure: Load Balancing
- name: Deploy HAProxy load balancers
  import_playbook: types/haproxy_lb.yml
  tags: ['haproxy', 'loadbalancer', 'infrastructure']

# Infrastructure: Monitoring
- name: Deploy Prometheus monitoring stack
  import_playbook: types/prometheus_monitor.yml
  tags: ['prometheus', 'monitoring', 'infrastructure']

# Landscape Health Verification
- name: Verify e-commerce platform deployment
  hosts: localhost
  gather_facts: false
  tags: ['verify', 'always']

  vars:
    lb_vip: "{{ groups['haproxy_lb'][0] }}"
    check_retries: 30
    check_delay: 10

  tasks:
    - name: Wait for platform to be available
      ansible.builtin.uri:
        url: "https://{{ lb_vip }}/api/health"
        status_code: 200
        validate_certs: false
        timeout: 10
      retries: "{{ check_retries }}"
      delay: "{{ check_delay }}"
      until: platform_health is succeeded
      register: platform_health

    - name: Verify all tiers have required hosts
      ansible.builtin.assert:
        that:
          - groups['postgresql_server'] | length >= 2
          - groups['java_app_server'] | length >= 3
          - groups['nginx_server'] | length >= 2
          - groups['haproxy_lb'] | length >= 2
        success_msg: "All tiers meet minimum host requirements"
        fail_msg: "One or more tiers do not have enough hosts"

    - name: Test database connectivity from application tier
      ansible.builtin.command: >
        psql -h {{ groups['postgresql_server'][0] }}
        -U app_user -d ecommerce -c "SELECT 1"
      delegate_to: "{{ groups['java_app_server'][0] }}"
      changed_when: false
      register: db_connectivity

    - name: Verify end-to-end request flow
      ansible.builtin.uri:
        url: "https://{{ lb_vip }}/api/products?limit=1"
        status_code: 200
        return_content: true
        validate_certs: false
      register: e2e_test

    - name: Display deployment summary
      ansible.builtin.debug:
        msg: >-
          E-commerce platform deployment complete:
          Database tier: {{ groups['postgresql_server'] | length }} PostgreSQL servers,
          Application tier: {{ groups['java_app_server'] | length }} Java app servers,
          Web tier: {{ groups['nginx_server'] | length }} Nginx servers,
          Load balancers: {{ groups['haproxy_lb'] | length }} HAProxy instances,
          Monitoring: {{ groups['prometheus_monitor'] | length }} Prometheus servers
