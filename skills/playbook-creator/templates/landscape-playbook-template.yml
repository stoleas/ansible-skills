---
# Landscape Playbook: [landscape_name]
# Purpose: Deploy complete [landscape_description] infrastructure
# Architecture: [Describe tiers and components]
# Author: [Your name or "Generated by ansible-skills"]
# Last Updated: [Date]

# Tier 1: Data Layer
# Deploy database servers first as foundation
- name: Deploy database tier
  import_playbook: types/database.yml
  tags: ['database', 'tier1', 'data']

# Tier 2: Application Layer
# Deploy application servers that depend on database
- name: Deploy application tier
  import_playbook: types/app_server.yml
  tags: ['application', 'tier2', 'app']

# Tier 3: Presentation Layer
# Deploy web servers as front-end
- name: Deploy web tier
  import_playbook: types/web_server.yml
  tags: ['web', 'tier3', 'frontend']

# Supporting Infrastructure
# Deploy supporting services (load balancers, monitoring, etc.)
- name: Deploy load balancers
  import_playbook: types/load_balancer.yml
  tags: ['loadbalancer', 'infrastructure']

- name: Deploy monitoring infrastructure
  import_playbook: types/monitoring.yml
  tags: ['monitoring', 'infrastructure']

# Landscape Verification
# Validate the complete deployment
- name: Verify landscape deployment
  hosts: localhost
  gather_facts: false
  tags: ['verify', 'always']

  tasks:
    - name: Wait for application to be available
      ansible.builtin.uri:
        url: "http://{{ groups['load_balancer'][0] }}/health"
        status_code: 200
        timeout: 10
      retries: 30
      delay: 10
      until: landscape_health is succeeded
      register: landscape_health

    - name: Verify all tiers are operational
      ansible.builtin.assert:
        that:
          - groups['database'] | length > 0
          - groups['app_server'] | length > 0
          - groups['web_server'] | length > 0
        success_msg: "All tiers deployed successfully"
        fail_msg: "Missing hosts in one or more tiers"

    - name: Display landscape deployment summary
      ansible.builtin.debug:
        msg: >-
          Landscape deployment complete:
          {{ groups['database'] | length }} database servers,
          {{ groups['app_server'] | length }} app servers,
          {{ groups['web_server'] | length }} web servers
