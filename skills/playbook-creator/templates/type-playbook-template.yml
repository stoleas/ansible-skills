---
# Purpose: Manages [type_name] hosts
# Type: [type_name]
# Functions: Lists all function roles applied to this type
# Author: [Your name or "Generated by ansible-skills"]
# Last Updated: [Date]

- name: Configure [type_name] servers
  hosts: [type_name]
  become: true

  vars:
    # Minimal playbook-level variables
    # Prefer inventory variables for infrastructure state
    deployment_timestamp: "{{ ansible_date_time.iso8601 }}"

  pre_tasks:
    - name: Update package cache
      ansible.builtin.package:
        update_cache: true
      changed_when: false
      when: ansible_os_family in ['Debian', 'RedHat']
      tags: ['always']

  roles:
    # Base function - operating system configuration
    - role: namespace.collection.base_linux
      tags: ['base_linux', 'base', 'os']

    # Type-specific function roles in logical order
    # Install → Configure → Deploy → Secure → Monitor

    - role: namespace.collection.[install_function]
      tags: ['[install_function]', '[category]', 'install']

    - role: namespace.collection.[config_function]
      tags: ['[config_function]', '[category]', 'config']

    - role: namespace.collection.[deploy_function]
      tags: ['[deploy_function]', 'application', 'deploy']

    - role: namespace.collection.[security_function]
      tags: ['[security_function]', 'security']

    - role: namespace.collection.monitoring_agent
      tags: ['monitoring_agent', 'monitoring']

  post_tasks:
    - name: Verify [type_name] service health
      ansible.builtin.uri:
        url: "http://{{ ansible_host }}:[port]/health"
        status_code: 200
        timeout: 10
      delegate_to: localhost
      ignore_errors: true
      register: health_check
      tags: ['verify']

    - name: Report deployment status
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }} deployment
          {{ 'succeeded' if health_check is succeeded else 'needs verification' }}
      tags: ['verify']
